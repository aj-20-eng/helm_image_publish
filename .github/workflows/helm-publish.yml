name: Publish Helm Chart to GHCR

on:
push:
branches: [ "main" ]

jobs:
publish:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - uses: azure/setup-helm@v4

  - name: Login to GHCR
    run: echo "${{ secrets.GHCR_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

  - name: Package Helm
    run: helm package charts/pgadmin4

  - name: Push to GHCR
    run: helm push pgadmin4-*.tgz oci://ghcr.io/${{ github.repository_owner }}/helm-charts

